<!DOCTYPE html>
<html>
<head>
    <title>Student Record System</title>
    <script src="lab5_scripts.js"></script>
</head>
<body>

    <div style="text-align: center; margin-top: 50px;">

        <h2>Student Record System</h2>

        <!-- Show current date -->
        <button type="button" onclick="time_now()">Show Current Date</button>
        <p id="dateTimeOutput"></p>

        <hr width="50%">

        <!-- Add Student Section -->
        <h3>ADD STUDENT</h3>
        <form>
            <label>Name:</label><br>
            <input type="text" id="name" required><br><br>

            <label>Age:</label><br>
            <input type="number" id="age" min="0" required><br><br>

            <label>Email:</label><br>
            <input type="email" id="mail" required><br><br>

            <label>Course:</label><br>
            <select id="course" required>
                <option value="">Select a course</option>
                <option value="ba_food_appreciation">BA Food Appreciation</option>
                <option value="ba_applied_poetry">BA Applied Poetry of the Future</option>
                <option value="bs_computer_repair">BS Computer Repair Shop</option>
                <option value="bs_video_gaming">BS Video Gaming</option>
                <option value="bs_install_download">BS Installing and Downloading</option>
            </select><br><br>

            <button type="button" onclick="add_student()">Submit</button>
        </form>

        <hr width="50%">

        <!-- Search Student Section -->
        <h3>SEARCH STUDENT</h3>
        <label>Student ID:</label><br>
        <input type="number" id="studentID"><br><br>
        <button type="button" onclick="find_student()">Search Student</button>
        <p id="studentOutput"></p>

        <hr width="50%">

        <!-- Display Students Section -->
        <h3>DISPLAY STUDENTS</h3>
        <button type="button" onclick="display_list()">Display All</button>
        <div id="allStudentsOutput"></div>

    </div>

    <br><br>

</body>
</html>
